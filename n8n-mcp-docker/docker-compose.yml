version: "3.8"

services:

  # ─────────────────────────────────────────────
  # Kubernetes MCP Server (stdio → SSE via supergateway)
  # ─────────────────────────────────────────────
  k8s-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k8s-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount your local kubeconfig so kubectl can reach your cluster
      - ${HOME}/.kube:/root/.kube:ro
    networks:
      - ai-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Accept: text/event-stream", "http://localhost:8080/mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # n8n
  # ─────────────────────────────────────────────

networks:
  ai-stack:
    driver: bridge

volumes:
  n8n_data:
  ollama_data:
