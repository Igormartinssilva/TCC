apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp
  namespace: imsilva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp
  template:
    metadata:
      labels:
        app: k8s-mcp
    spec:
      containers:
        - name: k8s-mcp
          image: imsilva/k8s-mcp:latest
          ports:
            - containerPort: 8080
          env:
            - name: MCP_TRANSPORT
              value: "sse"
            - name: MCP_PORT
              value: "8080"